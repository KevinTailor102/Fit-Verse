{% extends "base.html" %}
{% block title %}Register — FitVerse{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-dumbbell"></i></div>
      <h2>Join FitVerse</h2>
      <p>Start your AI-powered fitness journey today 🚀</p>
    </div>
    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus minlength="3" maxlength="64" />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" required />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="passwordField" class="form-control" placeholder="Min 8 characters" required minlength="8" />
          <button type="button" class="input-group-text btn-toggle-password" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="confirm_password" id="confirmField" class="form-control" placeholder="Repeat password" required />
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-auth">
        <i class="fas fa-user-plus me-2"></i>Create Account
      </button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
  </div>
</div>
<script>
function togglePassword() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') { f.type = 'text'; i.classList.replace('fa-eye','fa-eye-slash'); }
  else { f.type = 'password'; i.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
{% endblock %}
