{% extends "base.html" %}
{% block title %}Login — FitVerse{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo"><i class="fas fa-dumbbell"></i></div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue your fitness journey 💪</p>
    </div>
    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}" />
      <div class="mb-3">
        <label class="form-label">Username or Email</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="identifier" class="form-control" placeholder="Enter username or email" required autofocus />
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter password" required />
          <button type="button" class="input-group-text btn-toggle-password" onclick="togglePassword()">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="mb-4 d-flex justify-content-between align-items-center">
        <div class="form-check">
          <input type="checkbox" class="form-check-input" name="remember" id="rememberMe" />
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-auth">
        <i class="fas fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one free</a>
    </div>
  </div>
</div>
<script>
function togglePassword() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  if (f.type === 'password') { f.type = 'text'; i.classList.replace('fa-eye','fa-eye-slash'); }
  else { f.type = 'password'; i.classList.replace('fa-eye-slash','fa-eye'); }
}
</script>
{% endblock %}
